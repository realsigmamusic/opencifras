<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChordSheets</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('App pronto para uso Offline!'))
                    .catch((err) => console.log('Erro no SW:', err));
            });
        }
    </script>
    <link rel="manifest" href="./manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Contrato">
    <meta name="theme-color" content="#f8f9fa">
    <link rel="apple-touch-icon" href="maskable_icon_x512.png">
</head>
<body>

  <nav class="navbar">
    <span class="navbar-brand">ChordSheets</span>
    <span class="song-count" id="song-count"></span>
  </nav>

  <div class="container">

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Buscar por título ou artista…"
        autocomplete="off"
        autofocus
      />
    </div>

    <div class="song-list" id="song-list"></div>

    <div class="no-results" id="no-results">
      Nenhuma música encontrada.
    </div>

  </div>

  <script src="assets/vendor/fuse.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
