<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChordSheets</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/song.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-back">‹</a>
  <a href="index.html" class="navbar-brand">ChordSheets</a>
</nav>

<div class="container">

  <div id="loading-msg" class="state-msg">Carregando cifra…</div>
  <div id="error-msg"   class="state-msg" style="display:none"><span id="error-text"></span></div>

  <div id="song-content" style="display:none">

    <div class="transpose-row">
      <span class="transpose-label">Tom</span>
      <button id="btn-down"  class="btn-circle">−</button>
      <span   id="transpose-value" class="transpose-value">0</span>
      <button id="btn-up"    class="btn-circle">+</button>
      <button id="btn-reset" class="btn-reset">resetar</button>
      <span   id="current-key-label" class="key-label"></span>
    </div>

    <div id="chord-sheet"></div>

  </div>
</div>

<!-- Toolbar fixa -->
<div id="toolbar" class="toolbar" style="display:none">
  <div class="toolbar-inner">

    <!-- Controle de tamanho de fonte -->
    <div class="font-size-group">
      <button class="btn-font" id="btn-font-down" title="Diminuir fonte">A−</button>
      <span   class="font-size-label" id="font-size-display">16</span>
      <button class="btn-font" id="btn-font-up"   title="Aumentar fonte">A+</button>
    </div>

    <!-- Compartilhar e Download -->
    <button id="btn-share"    class="btn-toolbar">⬆ Compartilhar</button>
    <a      id="btn-download" href="#" download class="btn-toolbar">⬇ .cho</a>

  </div>
</div>

<script src="assets/vendor/chordsheetjs.min.js"></script>
<script src="assets/js/song.js"></script>
</body>
</html>
